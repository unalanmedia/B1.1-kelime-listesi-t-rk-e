<style>
  :root {

    --accent3: #e05c6a;
    --accent4: #4ecdc4;

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #1a1929 0%, #2d1b4e 100%);
    border-bottom: 1px solid var(--border);
    padding: 2rem 2rem 1.5rem;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 3vw, 2rem);
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  header p { color: var(--muted); font-size: 0.85rem; margin-top: 0.3rem; }
  .controls {
    display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 1rem; align-items: center;
  }
  input[type="text"] {
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.5rem 1rem;
    border-radius: 8px;
    font-size: 0.9rem;
    width: 220px;
    outline: none;
    transition: border 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent2); }
  input[type="text"]::placeholder { color: var(--muted); }
  .filter-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .filter-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.4rem 0.9rem;
    border-radius: 20px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent2);
    border-color: var(--accent2);
    color: white;
  }
  .stats { color: var(--muted); font-size: 0.8rem; margin-left: auto; }
  main { padding: 1.5rem 2rem; max-width: 1400px; margin: 0 auto; }
  .section { margin-bottom: 2.5rem; }
  .section-header {
    display: flex; align-items: center; gap: 1rem;
    margin-bottom: 1rem; padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--text);
  }
  .section-badge {
    padding: 0.2rem 0.7rem;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .badge-isim { background: rgba(124,106,240,0.2); color: var(--accent2); border: 1px solid rgba(124,106,240,0.3); }
  .badge-fiil { background: rgba(232,197,71,0.15); color: var(--accent); border: 1px solid rgba(232,197,71,0.3); }
  .badge-sifat { background: rgba(78,205,196,0.15); color: var(--accent4); border: 1px solid rgba(78,205,196,0.3); }
  .badge-zarf { background: rgba(255,159,67,0.15); color: var(--accent5); border: 1px solid rgba(255,159,67,0.3); }
  .badge-diger { background: rgba(224,92,106,0.15); color: var(--accent3); border: 1px solid rgba(224,92,106,0.3); }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 0.6rem;
  }
  .word-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    transition: transform 0.15s, border-color 0.15s;
    cursor: default;
  }
  .word-card:hover {
    transform: translateY(-1px);
    border-color: rgba(124,106,240,0.4);
  }
  .article-badge {
    font-size: 0.65rem;
    font-weight: 700;
    padding: 0.15rem 0.45rem;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 2px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .art-der { background: #3d6fd4; color: white; }
  .art-die { background: #c94444; color: white; }
  .art-das { background: #2e8b57; color: white; }
  .art-v { background: #c68a00; color: white; }
  .art-adj { background: #267a7a; color: white; }
  .art-adv { background: #8b4513; color: white; }
  .art-other { background: #555; color: white; }
  .word-body { flex: 1; min-width: 0; }
  .word-de {
    font-weight: 500;
    font-size: 0.92rem;
    color: var(--text);
    line-height: 1.3;
  }
  .word-info {
    font-size: 0.75rem;
    color: var(--accent2);
    margin-top: 0.1rem;
  }
  .word-tr {
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 0.2rem;
    line-height: 1.3;
  }
  .unit-dot {
    font-size: 0.65rem;
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
    background: rgba(255,255,255,0.06);
    color: var(--muted);
    flex-shrink: 0;
    margin-top: 2px;
    font-weight: 500;
  }
  .hidden { display: none !important; }
  @media (max-width: 600px) {
    header, main { padding: 1rem; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>

</header>

let activeType = 'all';
let activeUnit = 0;

function setType(t, btn) {
  activeType = t;
  document.querySelectorAll('.filter-btn').forEach(b => {
    if(['all','isim','fiil','sifat','zarf'].includes(b.getAttribute('onclick').replace("setType('","").split("'")[0])) b.classList.remove('active');
  });
  btn.classList.add('active');
  render();
}

function setUnit(u, btn) {
  activeUnit = u;
  document.querySelectorAll('.filter-btn').forEach(b => {
    if(b.getAttribute('onclick') && b.getAttribute('onclick').startsWith('setUnit')) b.classList.remove('active');
  });
  btn.classList.add('active');
  render();
}

function filter() { render(); }

function artClass(art) {
  if(art==='der') return 'art-der';
  if(art==='die') return 'art-die';
  if(art==='das') return 'art-das';
  if(art==='v') return 'art-v';
  if(art==='adj') return 'art-adj';
  if(art==='adv') return 'art-adv';
  return 'art-other';
}
function artLabel(art) {
  if(art==='der') return 'DER';
  if(art==='die') return 'DIE';
  if(art==='das') return 'DAS';
  if(art==='v') return 'FİİL';
  if(art==='adj') return 'SIFAT';
  if(art==='adv') return 'ZARF';
  return art.toUpperCase();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const sections = [
    {key:'isim', label:'İsimler', badge:'badge-isim'},
    {key:'fiil', label:'Fiiller', badge:'badge-fiil'},
    {key:'sifat', label:'Sıfatlar', badge:'badge-sifat'},
    {key:'zarf', label:'Zarflar & Edatlar & Bağlaçlar', badge:'badge-zarf'},
  ];
  let totalVisible = 0;
  let html = '';
  for(const sec of sections) {
    if(activeType !== 'all' && activeType !== sec.key) continue;
    let items = words.filter(w => {
      if(w.type !== sec.key) return false;
      if(activeUnit !== 0 && w.unit !== activeUnit) return false;
      if(q && !w.de.toLowerCase().includes(q) && !w.tr.toLowerCase().includes(q)) return false;
      return true;
    });
    if(!items.length) continue;
    totalVisible += items.length;
    html += `<div class="section">
      <div class="section-header">
        <h2 class="section-title">${sec.label}</h2>
        <span class="section-badge ${sec.badge}">${items.length} kelime</span>
      </div>
      <div class="grid">`;
    for(const w of items) {
      html += `<div class="word-card">
        <span class="article-badge ${artClass(w.art)}">${artLabel(w.art)}</span>
        <div class="word-body">
          <div class="word-de">${w.de}</div>
          ${w.info ? `<div class="word-info">${w.info}</div>` : ''}
          <div class="word-tr">${w.tr}</div>
        </div>
        <span class="unit-dot">Ü${w.unit}</span>
      </div>`;
    }
    html += `</div></div>`;
  }
  document.getElementById('main').innerHTML = html;
  document.getElementById('stats').textContent = `${totalVisible} kelime gösteriliyor`;
}

render();
</script>
